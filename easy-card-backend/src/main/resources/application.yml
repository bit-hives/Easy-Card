spring:
  application:
    name: easy-card
  
  datasource:
    url: jdbc:h2:mem:easycard
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: ThisIsASecretKeyForJWTTokenGenerationThatIsLongEnough123456789
  expiration: 86400000

logging:
  level:
    com.easycard: DEBUG
    org.springframework.security: DEBUG
