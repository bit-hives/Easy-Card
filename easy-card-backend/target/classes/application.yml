spring:
  application:
    name: easy-card
  
  datasource:
    url: jdbc:h2:mem:easycard
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: ThisIsASecretKeyForJWTTokenGenerationThatIsLongEnough123456789
  expiration: 86400000

whatsapp:
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  auth-token: ${WHATSAPP_AUTH_TOKEN:}
  verify-token: ${WHATSAPP_VERIFY_TOKEN:EasyCardVerify2024}
  business-phone: ${WHATSAPP_BUSINESS_PHONE:}
  expiry-notification-days: 30

scheduler:
  enabled: true
  cron: "0 0 9 * * *"  # Run daily at 9 AM

logging:
  level:
    com.easycard: DEBUG
    org.springframework.security: DEBUG
